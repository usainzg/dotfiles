import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 10.0

[font.bold]
# family = "Jetbrains Mono"
family = "BerkeleyMono Nerd Font"
style = "Bold"

[font.bold_italic]
# family = "Jetbrains Mono"
family = "BerkeleyMono Nerd Font"
style = "Bold Italic"

[font.italic]
# family = "Jetbrains Mono"
family = "BerkeleyMono Nerd Font"
style = "Italic"

[font.normal]
# family = "Jetbrains Mono"
family = "BerkeleyMono Nerd Font"
style = "Regular"
